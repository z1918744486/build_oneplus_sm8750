name: Build_oneplus_sm8750

on:
  workflow_dispatch:
    inputs:
      REPO_MANIFEST:
        description: "📝请选择要编译的机型："
        required: true
        type: choice
        options:
          - 'oneplus_13'
          - 'oneplus_ace5_pro'
          - 'oneplus_13t'
          - 'oneplus_pad_2_pro'
          - 'oneplus_ace5_ultra'
          - 'realme_GT7'
          - 'realme_GT7pro'
          - 'realme_GT7pro_Speed'
        default: 'oneplus_ace5_pro'

      keep_original_settings:
        description: "📝保持原内核名称及构建时间(不懂请保持默认)"
        required: false
        default: true
        type: boolean

      custom_kernel_suffix:
        description: "✏️ 自定义内核名称- 仅在取消勾选'保持原设置'时有效(不懂请保持默认)"
        required: false
        default: ''

      custom_kernel_time:
        description: "⏰ 自定义构建时间- 仅在取消勾选'保持原设置'时有效(不懂请保持默认)"
        required: false
        default: ''

      enable_feature_z:
        description: "添加风驰驱动"
        required: false
        default: true
        type: boolean

      enable_feature_b:
        description: "选择网络调度"
        required: false
        type: choice
        options:
          - 'FQ_CODEL'
          - 'BBR'
        default: 'FQ_CODEL'

      enable_kpm_support:
        description: "启用KPM驱动支持 (GPL 2.0 Licensed)"
        required: false
        default: true
        type: boolean

jobs:
  build:
    name: Build_${{ github.event.inputs.REPO_MANIFEST }}
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📊 Check disk space
        run: df -h

      - name: ⚙️ Set REPO_MANIFEST
        run: |
          case "${{ github.event.inputs.REPO_MANIFEST }}" in
            oneplus_ace5_pro)
              echo "REPO_MANIFEST=JiuGeFaCai_oneplus_ace5_pro_v" >> $GITHUB_ENV
              echo "DEVICES_NAME=oneplus_ace5_pro" >> $GITHUB_ENV
              ;;
            oneplus_13)
              echo "REPO_MANIFEST=JiuGeFaCai_oneplus_13_v" >> $GITHUB_ENV
              echo "DEVICES_NAME=oneplus_13" >> $GITHUB_ENV
              ;;
            *)
              echo "REPO_MANIFEST=${{ github.event.inputs.REPO_MANIFEST }}" >> $GITHUB_ENV
              echo "DEVICES_NAME=${{ github.event.inputs.REPO_MANIFEST }}" >> $GITHUB_ENV
              ;;
          esac
          
          case "${{ github.event.inputs.REPO_MANIFEST }}" in
            oneplus_13|oneplus_ace5_pro|realme_GT7pro_Speed)
              echo 'DEFAULT_SUFFIX=-android15-8-g013ec21bba94-abogki383916444-4k' >> $GITHUB_ENV
              ;;
            realme_GT7)
              echo 'DEFAULT_SUFFIX=-android15-8-g06c41a4a6e98-abogki395793266-4k' >> $GITHUB_ENV
              ;;
            realme_GT7pro)
              echo 'DEFAULT_SUFFIX=-android15-8-gc6f5283046c6-ab12364222-4k' >> $GITHUB_ENV
              ;;
            oneplus_13t)
              echo 'DEFAULT_SUFFIX=-android15-8-gd43086512890-abogki423825152-4k' >> $GITHUB_ENV
              ;;
            oneplus_pad_2_pro)
              echo 'DEFAULT_SUFFIX=-android15-8-g7b1f455c7143-ab13591283-4k' >> $GITHUB_ENV
              ;;
            oneplus_ace5_ultra)
              echo 'DEFAULT_SUFFIX=-android15-8-g29d86c5fc9dd-abogki428889875-4k' >> $GITHUB_ENV
              ;;
          esac
          
          if [ "${{ github.event.inputs.keep_original_settings }}" = "false" ] && [ -n "${{ github.event.inputs.custom_kernel_suffix }}" ]; then
            echo "KERNEL_SUFFIX=${{ github.event.inputs.custom_kernel_suffix }}" >> $GITHUB_ENV
          else
            echo "KERNEL_SUFFIX=$DEFAULT_SUFFIX" >> $GITHUB_ENV
          fi
          
          if [ "${{ github.event.inputs.keep_original_settings }}" = "false" ] && [ -n "${{ github.event.inputs.custom_kernel_time }}" ]; then
            echo "KERNEL_TIME=${{ github.event.inputs.custom_kernel_time }}" >> $GITHUB_ENV
          else
            case "${{ github.event.inputs.REPO_MANIFEST }}" in
              oneplus_13|oneplus_ace5_pro|realme_GT7pro_Speed)
                echo 'KERNEL_TIME="Tue Dec 17 23:36:49 UTC 2024"' >> $GITHUB_ENV
                ;;
              realme_GT7)
                echo 'KERNEL_TIME="Mon Jan 20 03:24:58 UTC 2025"' >> $GITHUB_ENV
                ;;
              realme_GT7pro)
                echo 'KERNEL_TIME="Fri Sep 13 02:08:57 UTC 2024"' >> $GITHUB_ENV
                ;;
              oneplus_13t)
                echo 'KERNEL_TIME="Tue Jun 10 12:12:23 UTC 2025"' >> $GITHUB_ENV
                ;;
              oneplus_pad_2_pro)
                echo 'KERNEL_TIME="Tue Jun  3 03:22:33 UTC 2025"' >> $GITHUB_ENV
                ;;
              oneplus_ace5_ultra)
                echo 'KERNEL_TIME="Tue Jul  1 19:48:18 UTC 2025"' >> $GITHUB_ENV
                ;;
            esac
          fi
          
          echo "CCACHE_DIR=$HOME/.ccache_${REPO_MANIFEST}" >> $GITHUB_ENV

      - name: 📦 Configure Git
        run: |
          git config --global user.name "Q1udaoyu"
          git config --global user.email "sucisama2888@gmail.com"

      - name: 🛠 Configure APT caching
        run: |
          sudo mkdir -p /var/cache/apt/archives/partial
          sudo touch /var/cache/apt/archives/lock
          sudo chmod 640 /var/cache/apt/archives/lock

      - name: 📦 Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -yq --no-install-recommends \
            python3 p7zip-full git curl ccache libelf-dev \
            build-essential libelf-dev flex bison libssl-dev \
            libncurses-dev liblz4-tool zlib1g-dev \
            libxml2-utils rsync unzip

      - name: 📥 Restore ccache
        uses: actions/cache@v3
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-${{ github.ref }}-${{ env.REPO_MANIFEST }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ env.REPO_MANIFEST }}-
            ccache-${{ runner.os }}-

      - name: 📥 Init ccache
        run: |
          mkdir -p "${{ env.CCACHE_DIR }}"
          ccache -M 8G

      - name: 📥 Install repo tool
        run: |
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/repo
          chmod a+x ~/repo
          sudo mv ~/repo /usr/local/bin/repo

      - name: 📥 Initialize repo and sync
        run: |
          mkdir kernel_workspace && cd kernel_workspace
          repo init -u https://github.com/showdo/kernel_manifest.git -b refs/heads/oneplus/sm8750 -m ${REPO_MANIFEST}.xml --depth=1
          repo sync -c -j$(nproc --all) --no-tags
          rm -f kernel_platform/common/android/abi_gki_protected_exports_* || true
          rm -f kernel_platform/msm-kernel/android/abi_gki_protected_exports_* || true

      - name: ⚙️ Set SuKiSU Ultra
        run: |
          cd kernel_workspace/kernel_platform
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/susfs-main/kernel/setup.sh" -o setup.sh
          bash setup.sh susfs-main
          cd KernelSU
          KSU_VERSION=$(expr $(git rev-list --count main 2>/dev/null || echo 13000) + 10700)
          echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV

      - name: 🔧 Setup KPM support
        if: ${{ inputs.enable_kpm_support }}
        run: |
          cd kernel_workspace/kernel_platform
          mkdir -p ./common/drivers/kpm
          cd ./common/drivers/kpm
          
          # Create basic KPM files
          echo "config KPM
tristate \"Kernel Package Manager support\"
default n
help
  This is the Kernel Package Manager (KPM) support.
  It allows loading kernel modules at runtime.
  
  This software is licensed under the GNU General Public License, version 2.
  See https://www.gnu.org/licenses/old-licenses/gpl-2.0.html for details.
  
  If unsure, say N." > Kconfig
          
          echo "obj-\$(CONFIG_KPM) += kpm.o" > Makefile
          
          echo "#include <linux/module.h>
#include <linux/kernel.h>
#include <linux/init.h>

static int __init kpm_init(void)
{
    printk(KERN_INFO \"KPM: Kernel Package Manager loaded (GPL 2.0 Licensed)\\n\");
    return 0;
}

static void __exit kpm_exit(void)
{
    printk(KERN_INFO \"KPM: Kernel Package Manager unloaded\\n\");
}

module_init(kpm_init);
module_exit(kpm_exit);

MODULE_LICENSE(\"GPL v2\");
MODULE_AUTHOR(\"Kernel Build System\");
MODULE_DESCRIPTION(\"Kernel Package Manager (GPL 2.0 Licensed)\");
MODULE_VERSION(\"1.0\");" > kpm.c
          
          # Add KPM to kernel config
          cd ../../..
          if ! grep -q "source \"drivers/kpm/Kconfig\"" ./drivers/Kconfig; then
            echo 'source "drivers/kpm/Kconfig"' >> ./drivers/Kconfig
          fi
          
          if ! grep -q "obj-\$(CONFIG_KPM)" ./drivers/Makefile; then
            echo 'obj-$(CONFIG_KPM) += kpm/' >> ./drivers/Makefile
          fi

      - name: 🔧 Set gki_defconfig
        run: |
          cd kernel_workspace/kernel_platform
          
          # Enable KPM if requested
          if [ "${{ inputs.enable_kpm_support }}" = "true" ]; then
            echo "CONFIG_KPM=y" >> ./common/arch/arm64/configs/gki_defconfig
          else
            echo "CONFIG_KPM=n" >> ./common/arch/arm64/configs/ggi_defconfig
          fi
          
          # Set kernel suffix
          sed -i "s/-4k/${{ env.KERNEL_SUFFIX }}/g" ./common/arch/arm64/configs/gki_defconfig
          
          # Remove version script check
          sed -i 's/check_defconfig//' ./common/build.config.gki

      - name: 🔨 Build Kernel
        run: |
          export PATH="/usr/lib/ccache:$PATH"
          export CCACHE_DIR="${{ env.CCACHE_DIR }}"
          export CCACHE_MAXSIZE="8G"
          export KBUILD_BUILD_TIMESTAMP="${{ env.KERNEL_TIME }}"
          
          cd kernel_workspace/kernel_platform/common
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC="ccache clang" O=out gki_defconfig
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC="ccache clang" O=out Image

      - name: 📦 Package Kernel
        run: |
          cd kernel_workspace/kernel_platform/common
          mkdir -p AnyKernel3
          cp out/arch/arm64/boot/Image AnyKernel3/
          
          # Add KPM module if enabled
          if [ "${{ inputs.enable_kpm_support }}" = "true" ] && [ -f "out/drivers/kpm/kpm.ko" ]; then
            mkdir -p AnyKernel3/modules
            cp out/drivers/kpm/kpm.ko AnyKernel3/modules/
          fi

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ env.DEVICES_NAME }}-${{ env.KSUVER }}
          path: kernel_workspace/kernel_platform/common/AnyKernel3/*
